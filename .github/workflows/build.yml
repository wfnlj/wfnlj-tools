name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyPDF2 pillow numpy pyinstaller requests schedule cryptography

      - name: Build with PyInstaller
        run: pyinstaller PDFMerger.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFMerger-Windows
          path: dist/PDFMerger.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyPDF2 pillow numpy pyinstaller requests schedule cryptography

      - name: Build with PyInstaller
        run: pyinstaller PDFMerger.spec

      - name: Create zip for Mac
        run: cd dist && zip -r PDFMerger-Mac.zip PDFMerger.app

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFMerger-Mac
          path: dist/PDFMerger-Mac.zip

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PDFMerger-Windows
          path: ./release

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: PDFMerger-Mac
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}